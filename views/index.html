<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Comprar Números - Rifa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.4em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .ganhador-banner {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .rifa-bloqueada {
            background: #f44336;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .info-bar {
            background: #667eea;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .numeros-selecionados {
            font-size: 0.85em;
            flex: 1;
        }

        .total-valor {
            font-size: 1.1em;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 8px;
        }

        .btn-limpar {
            background: #ff9800;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .legenda {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .legenda-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75em;
        }

        .cor {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .cor.disponivel { background: #4caf50; }
        .cor.reservado { background: #ff9800; }
        .cor.pago { background: #f44336; }
        .cor.selected { background: #2196F3; }

        .grid-numeros {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 10px;
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .numero-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        @media (min-width: 768px) {
            body { padding: 20px; }
            .container { padding: 30px; }
            h1 { font-size: 1.8em; }
            .grid-numeros {
                grid-template-columns: repeat(10, 1fr);
                gap: 10px;
                padding: 20px;
            }
            .numero-item { font-size: 1.2em; }
        }

        @media (max-width: 480px) {
            .grid-numeros { gap: 6px; padding: 8px; }
            .numero-item { font-size: 0.85em; }
        }

        .numero-item.disponivel {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
        }

        .numero-item.reservado {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .numero-item.pago {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .numero-item.selected {
            background: #2196F3 !important;
            box-shadow: 0 0 0 2px #ff9800;
            transform: scale(1.02);
        }

        .form-area {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
            font-size: 0.85em;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9em;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .info-pagamento {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="nomeRifa">🎫 Carregando...</h1>
        <div class="subtitle" id="descricaoRifa"></div>

        <div id="ganhadorBanner"></div>
        <div id="avisoBloqueio"></div>

        <div class="info-bar">
            <div class="numeros-selecionados">
                📌 <strong id="qtdSelecionados">0</strong> número(s): 
                <span id="listaNumerosSelecionados">nenhum</span>
            </div>
            <div class="total-valor">
                💰 R$ <span id="totalValor">0,00</span>
            </div>
            <button class="btn-limpar" onclick="limparTudo()">🗑️ Limpar</button>
        </div>

        <div class="legenda">
            <div class="legenda-item"><div class="cor disponivel"></div><span>Disponível</span></div>
            <div class="legenda-item"><div class="cor reservado"></div><span>Reservado</span></div>
            <div class="legenda-item"><div class="cor pago"></div><span>Pago</span></div>
            <div class="legenda-item"><div class="cor selected"></div><span>Selecionado</span></div>
        </div>

        <div class="grid-numeros" id="gridNumeros"></div>

        <div class="form-area">
            <h3>📝 Finalizar Compra</h3>
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo">
            </div>
            <div class="form-group">
                <label>WhatsApp (com DDD)</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <button id="btnReservar" disabled>🔒 Reservar Número(s)</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>✅ Reserva Realizada!</h2>
            <div class="info-pagamento" id="modalInfo"></div>
            <button onclick="fecharModal()" style="background: #666;">Fechar</button>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const usuarioIdUrl = pathParts[2];
        const rifaIdUrl = pathParts[3];

        let numeros = [];
        let numerosSelecionados = [];
        let rifaData = {};

        async function carregarRifa() {
            const response = await fetch(`/api/public/rifa/${usuarioIdUrl}/${rifaIdUrl}`);
            const data = await response.json();
            rifaData = data;
            
            document.getElementById('nomeRifa').textContent = `🎫 ${data.nome}`;
            document.getElementById('descricaoRifa').textContent = data.descricao || data.premio || '';
            
            if (data.status === 'finalizada') {
                document.getElementById('avisoBloqueio').innerHTML = '<div class="rifa-bloqueada">🔒 Esta rifa já foi finalizada!</div>';
                document.getElementById('btnReservar').disabled = true;
            }
            
            if (data.ultimo_ganhador) {
                document.getElementById('ganhadorBanner').innerHTML = `
                    <div class="ganhador-banner">
                        🎉 ÚLTIMO GANHADOR! 🎉<br>
                        <strong>Número ${data.ultimo_ganhador_numero}</strong> - ${data.ultimo_ganhador}
                    </div>
                `;
            }
            
            numeros = data.numeros;
            atualizarGrid();
        }

        function atualizarGrid() {
            const grid = document.getElementById('gridNumeros');
            grid.innerHTML = '';
            
            numeros.forEach(num => {
                const div = document.createElement('div');
                div.className = `numero-item ${num.status}`;
                div.textContent = num.numero;
                
                if (num.status === 'disponivel' && rifaData.status === 'ativa') {
                    div.onclick = () => toggleSelecionarNumero(num.numero);
                }
                
                if (numerosSelecionados.includes(num.numero)) {
                    div.classList.add('selected');
                }
                
                grid.appendChild(div);
            });
        }

        function toggleSelecionarNumero(numero) {
            const index = numerosSelecionados.indexOf(numero);
            if (index === -1) {
                numerosSelecionados.push(numero);
            } else {
                numerosSelecionados.splice(index, 1);
            }
            atualizarInterface();
        }

        function limparTudo() {
            numerosSelecionados = [];
            atualizarInterface();
        }

        function atualizarInterface() {
            document.querySelectorAll('.numero-item').forEach(el => {
                const num = parseInt(el.textContent);
                if (numerosSelecionados.includes(num)) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
            
            const qtd = numerosSelecionados.length;
            const total = qtd * rifaData.valor;
            
            document.getElementById('qtdSelecionados').textContent = qtd;
            
            if (qtd === 0) {
                document.getElementById('listaNumerosSelecionados').textContent = 'nenhum';
                document.getElementById('totalValor').textContent = '0,00';
                document.getElementById('btnReservar').disabled = true;
            } else {
                const numerosOrdenados = [...numerosSelecionados].sort((a,b) => a-b);
                document.getElementById('listaNumerosSelecionados').textContent = numerosOrdenados.join(', ');
                document.getElementById('totalValor').textContent = total.toFixed(2).replace('.', ',');
                document.getElementById('btnReservar').disabled = false;
            }
        }

        document.getElementById('btnReservar').onclick = async () => {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const email = document.getElementById('email').value;
            
            if (!nome || !telefone || !email) {
                alert('Preencha todos os campos!');
                return;
            }
            
            if (numerosSelecionados.length === 0) {
                alert('Selecione pelo menos um número!');
                return;
            }
            
            const response = await fetch(`/api/public/rifa/${usuarioIdUrl}/${rifaIdUrl}/reservar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    numeros: numerosSelecionados,
                    nome, telefone, email
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('modalInfo').innerHTML = `
                    <p><strong>✅ Reserva confirmada!</strong></p>
                    <p>📌 Números: ${data.numeros.map(n => n.numero).join(', ')}</p>
                    <p>💰 Total: R$ ${data.valor_total.toFixed(2)}</p>
                    <p>🔑 Use o código: ${data.numeros[0].comprovante}</p>
                    <p>📱 Envie o comprovante para o organizador</p>
                `;
                document.getElementById('modal').style.display = 'flex';
                
                document.getElementById('nome').value = '';
                document.getElementById('telefone').value = '';
                document.getElementById('email').value = '';
                limparTudo();
                carregarRifa();
            } else {
                alert('Erro: ' + data.error);
                if (data.numero_indisponivel) {
                    carregarRifa();
                    limparTudo();
                }
            }
        };

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }

        carregarRifa();
        setInterval(carregarRifa, 5000);
    </script>
</body>
</html>

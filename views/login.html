<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Rifa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .form { display: none; }
        .form.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg { color: #f44336; text-align: center; margin-top: 15px; display: none; }
        .success-msg { color: #4caf50; text-align: center; margin-top: 15px; display: none; }
        .info { text-align: center; margin-top: 20px; font-size: 0.8em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎫 Sistema de Rifa</h1>
        <div class="subtitle">Crie e gerencie suas rifas facilmente</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('login')">Entrar</button>
            <button class="tab-btn" onclick="showTab('cadastro')">Criar Conta</button>
        </div>

        <div id="loginForm" class="form active">
            <form onsubmit="fazerLogin(event)">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginSenha" required>
                </div>
                <button type="submit">Entrar</button>
                <div id="loginError" class="error-msg"></div>
            </form>
        </div>

        <div id="cadastroForm" class="form">
            <form onsubmit="fazerCadastro(event)">
                <div class="form-group">
                    <label>Nome da Empresa</label>
                    <input type="text" id="cadastroEmpresa">
                </div>
                <div class="form-group">
                    <label>Seu Nome</label>
                    <input type="text" id="cadastroNome" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="cadastroEmail" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="cadastroSenha" required>
                </div>
                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" id="cadastroConfirmarSenha" required>
                </div>
                <button type="submit">Criar Conta</button>
                <div id="cadastroError" class="error-msg"></div>
                <div id="cadastroSuccess" class="success-msg"></div>
            </form>
        </div>

        <div class="info">
            💡 Após criar sua conta, você poderá criar rifas e compartilhar o link com seus clientes.
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('cadastroForm').classList.add('active');
            }
        }

        async function fazerLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('usuarioId', data.usuario.id);
                localStorage.setItem('usuarioNome', data.usuario.nome);
                window.location.href = '/dashboard';
            } else {
                document.getElementById('loginError').textContent = data.error;
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function fazerCadastro(event) {
            event.preventDefault();
            const nome = document.getElementById('cadastroNome').value;
            const email = document.getElementById('cadastroEmail').value;
            const senha = document.getElementById('cadastroSenha').value;
            const confirmar = document.getElementById('cadastroConfirmarSenha').value;
            const empresa = document.getElementById('cadastroEmpresa').value;
            
            if (senha !== confirmar) {
                document.getElementById('cadastroError').textContent = 'Senhas não coincidem!';
                document.getElementById('cadastroError').style.display = 'block';
                return;
            }
            
            const response = await fetch('/api/cadastrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha, empresa })
            });
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('cadastroSuccess').textContent = 'Conta criada! Faça login.';
                document.getElementById('cadastroSuccess').style.display = 'block';
                setTimeout(() => {
                    showTab('login');
                    document.getElementById('loginEmail').value = email;
                }, 2000);
            } else {
                document.getElementById('cadastroError').textContent = data.error;
                document.getElementById('cadastroError').style.display = 'block';
            }
        }
    </script>
</body>
</html>

<script>
    let usuarioId = null;
    let rifaId = null;
    
    // Pegar parâmetros da URL
    const urlParams = new URLSearchParams(window.location.search);
    usuarioId = urlParams.get('usuarioId');
    rifaId = urlParams.get('rifaId');
    
    function fazerLogin() {
        const email = document.getElementById('loginEmail').value;
        const senha = document.getElementById('senhaAdmin').value;
        
        if (!email || !senha) {
            document.getElementById('errorMsg').textContent = 'Preencha email e senha!';
            document.getElementById('errorMsg').style.display = 'block';
            return;
        }
        
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                localStorage.setItem('adminLogado', 'true');
                localStorage.setItem('usuarioId', data.usuario.id);
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainWrapper').style.display = 'block';
                carregarDashboard();
                carregarVendasPendentes();
                carregarConfiguracoes();
            } else {
                document.getElementById('errorMsg').textContent = data.error;
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        });
    }
    
    function fazerLogout() {
        localStorage.removeItem('adminLogado');
        localStorage.removeItem('usuarioId');
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainWrapper').style.display = 'none';
    }
    
    function getHeaders() {
        return {
            'Content-Type': 'application/json',
            'user-token': localStorage.getItem('usuarioId')
        };
    }
    
    // Todas as funções abaixo usam as rotas /api/user/...
    async function carregarDashboard() {
        try {
            const response = await fetch(`/api/user/rifa/${rifaId}/dashboard`, { headers: getHeaders() });
            const data = await response.json();
            document.getElementById('dashboardCards').innerHTML = `
                <div class="card"><h3>📊 Disponíveis</h3><div class="number">${data.disponiveis || 0}</div></div>
                <div class="card"><h3>⏳ Reservados</h3><div class="number">${data.reservados || 0}</div></div>
                <div class="card"><h3>✅ Pagos</h3><div class="number">${data.pagos || 0}</div></div>
                <div class="card"><h3>💰 Total</h3><div class="number">R$ ${data.total_arrecadado || 0}</div></div>
            `;
        } catch(e) { console.error(e); }
    }
    
    async function carregarVendasPendentes() {
        try {
            const response = await fetch(`/api/user/rifa/${rifaId}/vendas`, { headers: getHeaders() });
            const vendas = await response.json();
            const tbody = document.querySelector('#tabelaVendas tbody');
            
            if (vendas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">Nenhuma venda pendente</td></tr>';
                return;
            }
            
            const vendasPorCliente = {};
            vendas.forEach(v => {
                const key = `${v.nome}|${v.telefone}|${v.email}`;
                if (!vendasPorCliente[key]) {
                    vendasPorCliente[key] = {
                        nome: v.nome,
                        telefone: v.telefone,
                        email: v.email,
                        numeros: [],
                        vendas: []
                    };
                }
                vendasPorCliente[key].numeros.push(v.numero);
                vendasPorCliente[key].vendas.push(v);
            });
            
            let html = '';
            for (const key in vendasPorCliente) {
                const cliente = vendasPorCliente[key];
                const valorTotal = cliente.vendas.reduce((sum, v) => sum + parseFloat(v.valor_pago), 0);
                html += `
                    <tr>
                        <td><strong>${cliente.numeros.sort((a,b)=>a-b).join(', ')}</strong></td>
                        <td>${cliente.nome}</td>
                        <td>${cliente.telefone}</td>
                        <td>${cliente.email}</td>
                        <td>R$ ${valorTotal.toFixed(2)}</td>
                        <td>${cliente.numeros.length}</td>
                        <td>
                            ${cliente.vendas.map(v => `
                                <button class="btn-confirmar" onclick="confirmarPagamento('${v.id}', ${v.numero})">✅ ${v.numero}</button>
                            `).join(' ')}
                            ${cliente.vendas.map(v => `
                                <button class="btn-cancelar" onclick="cancelarVenda('${v.id}', ${v.numero})">❌ ${v.numero}</button>
                            `).join(' ')}
                        </td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function carregarTotalPagos() {
        try {
            const response = await fetch(`/api/user/rifa/${rifaId}/dashboard`, { headers: getHeaders() });
            const data = await response.json();
            document.getElementById('totalPagos').textContent = data.pagos || 0;
        } catch(e) { console.error(e); }
    }
    
    async function carregarTodosNumeros() {
        try {
            const response = await fetch(`/api/user/rifa/${rifaId}/numeros`, { headers: getHeaders() });
            const numeros = await response.json();
            const tbody = document.querySelector('#tabelaNumeros tbody');
            tbody.innerHTML = numeros.map(n => `
                <tr>
                    <td><strong>${n.numero}</strong></td>
                    <td><span class="status-badge status-${n.status}">${n.status}</span></td>
                    <td>${n.comprador_nome || '-'}</td>
                    <td>${n.comprador_telefone || '-'}</td>
                    <td>${n.data_reserva ? new Date(n.data_reserva).toLocaleString() : '-'}</td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }
    
    async function carregarHistorico() {
        try {
            const response = await fetch(`/api/user/rifa/${rifaId}/historico`, { headers: getHeaders() });
            const sorteios = await response.json();
            const tbody = document.querySelector('#tabelaHistorico tbody');
            if (sorteios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Nenhum sorteio</td></tr>';
                return;
            }
            tbody.innerHTML = sorteios.map(s => `
                <tr>
                    <td>${new Date(s.data_sorteio).toLocaleString()}</td>
                    <td><strong>${s.numero}</strong></td>
                    <td>${s.ganhador_nome}</td>
                    <td>${s.ganhador_telefone}</td>
                    <td><a href="https://wa.me/55${s.ganhador_telefone?.replace(/\D/g, '')}" target="_blank" class="btn-whatsapp">WhatsApp</a></td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }
    
    async function confirmarPagamento(vendaId, numero) {
        if (confirm(`Confirmar pagamento do número ${numero}?`)) {
            await fetch(`/api/user/rifa/${rifaId}/confirmar-pagamento`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ venda_id: vendaId, numero: numero })
            });
            alert('✅ Confirmado!');
            carregarVendasPendentes();
            carregarDashboard();
            carregarTodosNumeros();
            carregarTotalPagos();
        }
    }
    
    async function cancelarVenda(vendaId, numero) {
        if (confirm(`Cancelar venda do número ${numero}?`)) {
            await fetch(`/api/user/rifa/${rifaId}/cancelar-venda`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ venda_id: vendaId, numero: numero })
            });
            alert('❌ Cancelado!');
            carregarVendasPendentes();
            carregarDashboard();
            carregarTodosNumeros();
            carregarTotalPagos();
        }
    }
    
    async function realizarSorteio() {
        if (confirm('Realizar sorteio?')) {
            const response = await fetch(`/api/user/rifa/${rifaId}/sortear`, { method: 'POST', headers: getHeaders() });
            const data = await response.json();
            if (data.success) {
                document.getElementById('numeroSorteado').textContent = data.numero;
                document.getElementById('infoGanhador').innerHTML = `<p><strong>🏆 ${data.nome}</strong><br>📱 ${data.telefone}</p>`;
                document.getElementById('modalSorteio').style.display = 'flex';
                carregarDashboard();
                carregarHistorico();
                carregarTotalPagos();
            } else {
                alert('Erro: ' + data.error);
            }
        }
    }
    
    async function resetarRifa() {
        if (confirm('Resetar TODA a rifa?')) {
            await fetch(`/api/user/rifa/${rifaId}/reset`, { method: 'POST', headers: getHeaders() });
            alert('✅ Rifa resetada!');
            carregarDashboard();
            carregarVendasPendentes();
            carregarTodosNumeros();
            carregarTotalPagos();
        }
    }
    
    async function limparVendas() {
        if (confirm('Limpar todas vendas pendentes?')) {
            // Para limpar vendas, resetamos a rifa
            await resetarRifa();
        }
    }
    
    async function carregarConfiguracoes() {
        try {
            const response = await fetch(`/api/user/rifa/${rifaId}/configuracoes`, { headers: getHeaders() });
            const config = await response.json();
            document.getElementById('nomeRifa').value = config.nome_rifa || '';
            document.getElementById('descricaoRifa').value = config.descricao_rifa || '';
            document.getElementById('valorRifa').value = config.valor_rifa || '';
            document.getElementById('chavePix').value = config.chave_pix || '';
            document.getElementById('adminWhatsapp').value = config.admin_whatsapp || '';
            document.getElementById('imagemRifa').value = config.imagem_rifa || '';
            document.getElementById('corPrincipal').value = config.cor_principal || '#667eea';
            document.getElementById('corSecundaria').value = config.cor_secundaria || '#764ba2';
            document.getElementById('mensagemBoasVindas').value = config.mensagem_boas_vindas || '';
            document.getElementById('instrucoesPagamento').value = config.instrucoes_pagamento || '';
            document.getElementById('rodapeComprovante').value = config.rodape_comprovante || '';
            document.getElementById('mensagemWhatsApp').value = config.mensagem_whatsapp || '';
            document.getElementById('mensagemGanhador').value = config.mensagem_ganhador || '';
            atualizarPreview();
        } catch(e) { console.error(e); }
    }
    
    async function salvarConfiguracoes() {
        const config = {
            nome_rifa: document.getElementById('nomeRifa').value,
            descricao_rifa: document.getElementById('descricaoRifa').value,
            valor_rifa: parseFloat(document.getElementById('valorRifa').value),
            chave_pix: document.getElementById('chavePix').value,
            admin_whatsapp: document.getElementById('adminWhatsapp').value,
            imagem_rifa: document.getElementById('imagemRifa').value,
            cor_principal: document.getElementById('corPrincipal').value,
            cor_secundaria: document.getElementById('corSecundaria').value,
            mensagem_boas_vindas: document.getElementById('mensagemBoasVindas').value,
            instrucoes_pagamento: document.getElementById('instrucoesPagamento').value,
            rodape_comprovante: document.getElementById('rodapeComprovante').value,
            mensagem_whatsapp: document.getElementById('mensagemWhatsApp').value,
            mensagem_ganhador: document.getElementById('mensagemGanhador').value
        };
        await fetch(`/api/user/rifa/${rifaId}/configuracoes`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(config) });
        alert('✅ Salvo!');
    }
    
    async function exportarDados() {
        const response = await fetch(`/api/user/rifa/${rifaId}/exportar`, { headers: getHeaders() });
        const data = await response.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `vendas_${new Date().toISOString()}.json`;
        a.click();
    }
    
    async function exportarCSV() {
        const response = await fetch(`/api/user/rifa/${rifaId}/exportar`, { headers: getHeaders() });
        const data = await response.json();
        if (data.length === 0) { alert('Sem dados'); return; }
        const headers = ['Número', 'Nome', 'Telefone', 'Email', 'Valor'];
        const rows = [headers, ...data.map(r => [r.numero, r.nome, r.telefone, r.email, r.valor_pago])];
        const csv = rows.map(row => row.join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `vendas_${new Date().toISOString()}.csv`;
        a.click();
    }
    
    function atualizarPreview() {
        const preview = document.getElementById('previewComprovante');
        if (preview) {
            const nome = document.getElementById('nomeRifa')?.value || 'Rifa';
            const valor = document.getElementById('valorRifa')?.value || '10';
            preview.innerHTML = `<div style="border:1px solid #ddd;padding:15px"><h3>🎫 ${nome}</h3><p>Valor: R$ ${valor}</p></div>`;
        }
    }
    
    function showTab(tabId) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        const tab = document.getElementById(tabId);
        if (tab) tab.classList.add('active');
        
        if (tabId === 'dashboard') carregarDashboard();
        if (tabId === 'vendas') carregarVendasPendentes();
        if (tabId === 'sorteio') carregarTotalPagos();
        if (tabId === 'historico') carregarHistorico();
        if (tabId === 'todos-numeros') carregarTodosNumeros();
        if (tabId === 'configuracoes') carregarConfiguracoes();
    }
    
    function fecharModalSorteio() {
        document.getElementById('modalSorteio').style.display = 'none';
    }
    
    document.getElementById('nomeRifa')?.addEventListener('input', atualizarPreview);
    document.getElementById('valorRifa')?.addEventListener('input', atualizarPreview);
    
    function checkLogin() {
        if (localStorage.getItem('adminLogado') === 'true' && localStorage.getItem('usuarioId')) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainWrapper').style.display = 'block';
            carregarDashboard();
            carregarVendasPendentes();
            carregarConfiguracoes();
        }
    }
    checkLogin();
</script>
